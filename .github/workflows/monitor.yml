name: SMC Sentinela Monitor 24h
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Instalar Dependências
        run: pip install pandas requests yfinance matplotlib mplfinance
      - name: Rodar Auditoria e Sentinela
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ID_MAE: ${{ secrets.TELEGRAM_ID_MAE }}
          WEBAPP_URL: ${{ secrets.WEBAPP_URL }}
        run: python brain.py
