name: SMC Sentinela Monitor 24h
on:
  schedule:
    - cron: '*/15 * * * *' # Roda a cada 15 min
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Instalar Ferramentas de Elite
        run: |
          pip install pandas requests yfinance matplotlib mplfinance
      - name: Executar Inteligência
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WEBAPP_URL: ${{ secrets.WEBAPP_URL }}
        run: python brain.py
