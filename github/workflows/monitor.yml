name: SMC Sentinela Monitor 24h
# Forçando re-indexação do workflow do Gilney
on:
  schedule:
    - cron: '*/15 * * * *' # Roda a cada 15 minutos automaticamente
  workflow_dispatch: # Permite que você rode o bot manualmente pelo site/celular

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar Ferramentas de Análise
        run: |
          pip install pandas requests yfinance

      - name: Executar Inteligência SMC
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python brain.py
        
